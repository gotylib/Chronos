# Один zip: framework-dependent (нужен .NET 8 runtime на сервере) — совместим с кодовыми jobs/тестами.
# Установка на сервере: deploy/linux/setup-chronos-agent.sh (ставит runtime при необходимости, опрос настроек).

name: Chronos Agent (publish zip)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: dotnet publish (framework-dependent)
        run: dotnet publish src/Chronos.Agent/Chronos.Agent.csproj -c Release -o ./publish

      - name: Bundle zip + deploy/linux
        run: |
          mkdir -p bundle
          cp -a publish/. bundle/
          cp -a deploy/linux bundle/deploy-linux
          (cd bundle && zip -r ../chronos-agent-linux-x64.zip .)

      - name: Upload artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: chronos-agent-linux-x64
          path: chronos-agent-linux-x64.zip

      - name: Attach zip to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: chronos-agent-linux-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
