# Chronos stack — статический конфиг. TCP-слушатели задаются вторым файлом при запуске:
#   haproxy -f .../haproxy.cfg -f .../dynamic/chronos-tcp.cfg  (см. docker-compose)
global
    log stdout format raw local0 info
    maxconn 40000

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 10s
    timeout client 1m
    timeout server 1m

# HTTP stats внутри контейнера на :8404; с хоста в compose см. ports (обычно http://127.0.0.1:18404/stats).
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
