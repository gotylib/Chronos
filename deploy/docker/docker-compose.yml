# Stack: Postgres + HAProxy + Loki + Grafana + Chronos.Master + Chronos.Agent
# From repo root: docker compose -f deploy/docker/docker-compose.yml up --build
name: chronos

services:
  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.3.0
    depends_on:
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
      POSTGRES_DB: chronos_master
    volumes:
      - chronos_pg:/var/lib/postgresql/data
      - ./postgres/02-chronos-agent.sql:/docker-entrypoint-initdb.d/02-chronos-agent.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos -d chronos_master"]
      interval: 5s
      timeout: 5s
      retries: 5

  # HAProxy по умолчанию в bridge-сети: listen-порты из chronos-tcp.cfg нужно пробрасывать на хост (ниже диапазон).
  # На Linux без этого можно поднять тот же сервис с network_mode: host — тогда bind *:PORT сразу на хосте;
  # см. deploy/docker/README.md → «HAProxy на Linux (host network)».
  haproxy:
    image: haproxy:3.0-alpine
    # Обёртка: при изменении dynamic/chronos-tcp.cfg (Master) шлём SIGHUP — иначе новые listen не подхватываются.
    # Скрипт держите в LF (см. .gitattributes); на Windows CRLF ломает sh.
    entrypoint: ["/bin/sh", "/usr/local/etc/haproxy/run-with-dynamic-reload.sh"]
    # Linux: иначе host.docker.internal из контейнера не резолвится (нужен для backend к портам на хосте).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      chronos-master:
        condition: service_started
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./haproxy/dynamic:/usr/local/etc/haproxy/dynamic
      - ./haproxy/run-with-dynamic-reload.sh:/usr/local/etc/haproxy/run-with-dynamic-reload.sh:ro
    ports:
      # Host 18404: часто 8404 уже занят (старый Traefik stats, другие сервисы). Внутри контейнера по-прежнему 8404.
      - "18404:8404"
      # Диапазон TCP listen из chronos-tcp.cfg (HAProxy внутри контейнера) — без проброса с хоста клиенты не достучатся.
      - "5002-5099:5002-5099"
    healthcheck:
      test:
        [
          "CMD",
          "haproxy",
          "-c",
          "-f",
          "/usr/local/etc/haproxy/haproxy.cfg",
          "-f",
          "/usr/local/etc/haproxy/dynamic/chronos-tcp.cfg"
        ]
      interval: 15s
      timeout: 5s
      retries: 3

  chronos-master:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.master
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CHRONOS_MASTER_FLUENT_SANDBOX_ENABLED: "1"
      ConnectionStrings__Chronos: Host=postgres;Port=5432;Database=chronos_master;Username=chronos;Password=chronos
      CHRONOS_HAPROXY_DYNAMIC_DIR: /haproxy-dynamic
      # Диапазон должен совпадать с пробросом портов у сервиса haproxy — иначе Master подберёт listen, который не выйдет наружу.
      CHRONOS_HAPROXY_LISTEN_PORT_MIN: "5002"
      CHRONOS_HAPROXY_LISTEN_PORT_MAX: "5099"
      # Подсказка UI для прокси контейнеров с хоста агента (тот же Docker, что и HAProxy): host + опубликованный порт.
      CHRONOS_HAPROXY_TCP_AGENT_SERVICE_DNS: chronos-agent
      CHRONOS_HAPROXY_TCP_AGENT_HOST_PUBLISHED_PORT: "5001"
      CHRONOS_HAPROXY_TCP_AGENT_CONTAINER_PORT: "5001"
      CHRONOS_HAPROXY_TCP_SUGGESTED_BACKEND_HOST: host.docker.internal
      CHRONOS_MASTER_PUBLIC_HOST: localhost
      CHRONOS_MASTER_INSTANCE_ID: docker-master-1
      CHRONOS_MASTER_LOKI_PUSH_URL: http://loki:3100/loki/api/v1/push
      # Репликация томов в MinIO (агент поднимает MinIO на хосте :9019). На Docker Desktop: host.docker.internal; на Linux часто 172.17.0.1.
      CHRONOS_VOLUME_STORAGE_ENABLED: "1"
      CHRONOS_VOLUME_STORAGE_SERVICE_URL: http://host.docker.internal:9019
      CHRONOS_VOLUME_STORAGE_ACCESS_KEY: chronosminio
      CHRONOS_VOLUME_STORAGE_SECRET_KEY: chronos-stack-minio-dev
    volumes:
      - ./haproxy/dynamic:/haproxy-dynamic
    ports:
      - "5000:8080"

  chronos-agent:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.agent
    depends_on:
      postgres:
        condition: service_healthy
      chronos-master:
        condition: service_started
      loki:
        condition: service_started
    environment:
      ASPNETCORE_URLS: http://+:5001
      CHRONOS_AGENT_APP_PATH: /app/data
      CHRONOS_MASTER_URL: http://chronos-master:8080
      CHRONOS_AGENT_BASE_URL: http://chronos-agent:5001
      CHRONOS_AGENT_ID: docker-agent-1
      CHRONOS_AGENT_EMBEDDED_MINIO_ENABLED: "1"
      CHRONOS_AGENT_EMBEDDED_MINIO_ROOT_PASSWORD: chronos-stack-minio-dev
      CHRONOS_AGENT_EMBEDDED_MINIO_API_PORT: "9019"
      CHRONOS_AGENT_EMBEDDED_MINIO_CONSOLE_PORT: "9029"
      CHRONOS_AGENT_EMBEDDED_MINIO_PUBLIC_HOST: host.docker.internal
      CHRONOS_MASTER_INSTANCE_ID: docker-master-1
      CHRONOS_AGENT_LOKI_PUSH_URL: http://loki:3100/loki/api/v1/push
      ConnectionStrings__AgentMetadata: Host=postgres;Port=5432;Database=chronos_agent;Username=chronos;Password=chronos
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - chronos_agent_data:/app/data
    ports:
      - "5001:5001"

volumes:
  chronos_pg: {}
  chronos_agent_data: {}
