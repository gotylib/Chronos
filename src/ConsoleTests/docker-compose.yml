version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    ports:
    - 5432:5432
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: appdb
    networks:
    - app-net
    volumes:
    - pgdata:/var/lib/postgresql/data:rw
    restart: unless-stopped
    init: true
  nginx:
    image: nginx:alpine
    ports:
    - 8080:80
    depends_on:
    - postgres
    networks:
    - app-net
    restart: unless-stopped
    init: true
networks:
  app-net:
    driver: bridge
volumes:
  pgdata:
    driver: local
